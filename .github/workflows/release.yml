name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # OIDC Trusted Publishing 必需

jobs:
  publish:
    runs-on: ubuntu-latest   # 必须用 GitHub-hosted runner，OIDC 不支持 self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # OIDC 要求 Node >= 22.14
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest   # OIDC 要求 npm CLI >= 11.5.1
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag version:   $TAG"
          echo "package.json:  $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Publish to npm via OIDC Trusted Publishing
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
