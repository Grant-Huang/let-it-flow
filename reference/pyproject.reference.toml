[project]
name = "litpilot-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.115.5",
    "uvicorn[standard]==0.32.1",
    "python-multipart==0.0.12",
    "httpx==0.28.1",
    "h2==4.1.0",
    "beautifulsoup4==4.12.3",
    "lxml==5.3.0",
    "openai==1.57.4",
    "python-dotenv==1.0.1",
    "pydantic>=2.11.0",
    "pydantic-settings>=2.7.0",
    "anyio==4.7.0",
    "filelock==3.16.1",
]

[dependency-groups]
dev = [
    "pytest==8.3.4",
    "pytest-asyncio==0.24.0",
]

[tool.vercel]
entrypoint = "app.main:app"
